[profile.default]
src = "src"
out = "out"
libs = ["lib"]

# Solidity compiler version
solc_version = "0.8.20"

# Enable optimizer
optimizer = true
optimizer_runs = 200

# Load environment variables
dotenv = ".env"

# RPC endpoints
[rpc_endpoints]
fuji = "https://api.avax-test.network/ext/bc/C/rpc"

# Etherscan-style explorer (Snowtrace)
[etherscan]
fuji = { key = "${SNOWTRACE_API_KEY}", url = "https://api-testnet.snowtrace.io/api" }